name: Rust Tests

on:
  push:
    branches: [main, feature/rust-tauri-migration]
  pull_request:
    branches: [main]

jobs:
  rust-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test --workspace -- --test-threads=1
